<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fighter Jet HUD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hud-text { text-shadow: 0 0 8px rgba(34, 197, 94, 0.8); }
    .scanline { background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,255,0,0.05) 50%, rgba(0,0,0,0)); background-size: 100% 4px; }
    .tactical-grid { background-image: linear-gradient(rgba(34, 197, 94, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(34, 197, 94, 0.15) 1px, transparent 1px); background-size: 40px 40px; background-position: center; }
    .corner-brackets { position: relative; }
    .corner-brackets::before { content: ''; position: absolute; top: -4px; left: -4px; border-top: 2px solid #22c55e; border-left: 2px solid #22c55e; width: 12px; height: 12px; }
    .corner-brackets::after { content: ''; position: absolute; bottom: -4px; right: -4px; border-bottom: 2px solid #22c55e; border-right: 2px solid #22c55e; width: 12px; height: 12px; }
  </style>
</head>
<body class="bg-black text-green-500 font-mono m-0 p-4 h-screen flex items-center justify-center select-none overflow-hidden">

  <!-- Logic and Configuration -->
  <script>
    // --- EASY CONFIGURATION ---
    // Easily add, remove, or edit items here. 
    // Set side to 'left' or 'right'.
    // Replace the 'icon' URLs below with the paths to your local .png files
    const SYSTEMS = {
      radar: { name: 'RADAR', side: 'left', icon: 'https://placehold.co/64x64/22c55e/000000.png?text=RDR', type: 'sensor', iframeUrl: 'https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=%C2%B0C&metricWind=km/h&zoom=5&overlay=radar&product=radar&level=surface&lat=47.5&lon=14.5' },
      flares: { name: 'FLARES', side: 'left', icon: 'https://placehold.co/64x64/22c55e/000000.png?text=FLR', type: 'countermeasure', ammo: 30 },
      gun: { name: '20MM GUN', side: 'right', icon: 'https://placehold.co/64x64/22c55e/000000.png?text=GUN', type: 'weapon', ammo: 500 },
      missiles: { name: 'AIM-9X', side: 'right', icon: 'https://placehold.co/64x64/22c55e/000000.png?text=MSL', type: 'weapon', ammo: 4 }
    };

    let activeSystemId = 'radar';
    let masterArm = false;

    function playSound(url) {
      new Audio(url).play().catch(e => console.log("Sound blocked by browser"));
    }

    // Called when a side button is clicked (or triggered by ESP32)
    function selectSystem(id) {
      activeSystemId = id;
      updateUI();
      playSound('https://actions.google.com/sounds/v1/ui/button_click.ogg');
    }

    function toggleMasterArm() {
      masterArm = !masterArm;
      playSound('https://actions.google.com/sounds/v1/ui/button_click.ogg');
      updateUI();
    }

    // Called when the main trigger is pressed (or triggered by ESP32)
    function triggerAction() {
      if (!masterArm) {
        playSound('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        return;
      }

      const sys = SYSTEMS[activeSystemId];
      const centerGraphic = document.getElementById('center-graphic');
      
      // Visual flash effect
      centerGraphic.classList.add('border-red-500', 'scale-95');
      setTimeout(() => centerGraphic.classList.remove('border-red-500', 'scale-95'), 150);

      if (sys.type === 'sensor') {
         playSound('https://actions.google.com/sounds/v1/alarms/sonar_ping.ogg');
         return;
      }

      if (sys.ammo > 0) {
        // Reduce ammo (gun uses 25 per burst, others use 1)
        sys.ammo -= (activeSystemId === 'gun' ? 25 : 1);
        playSound(activeSystemId === 'missiles' ? 'https://actions.google.com/sounds/v1/weapons/rocket_launch.ogg' : 'https://actions.google.com/sounds/v1/weapons/machine_gun_burst.ogg');
        updateUI();
      } else {
        playSound('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
      }
    }

    // --- UI GENERATION ---
    // This builds the HTML automatically based on the SYSTEMS object above
    function init() {
      const leftMenu = document.getElementById('left-menu');
      const rightMenu = document.getElementById('right-menu');
      
      leftMenu.innerHTML = '';
      rightMenu.innerHTML = '';

      for (const [id, sys] of Object.entries(SYSTEMS)) {
        const btn = document.createElement('button');
        btn.id = `btn-${id}`;
        btn.onclick = () => selectSystem(id);
        
        btn.innerHTML = `
          <img src="${sys.icon}" alt="${sys.name}" class="w-10 h-10 mb-2 object-contain drop-shadow-[0_0_4px_rgba(34,197,94,0.8)]" onerror="this.src='https://placehold.co/64x64/22c55e/000000.png?text=ERR'" />
          <div class="text-xs font-bold tracking-wider">${sys.name}</div>
          ${sys.ammo !== undefined ? `<div class="text-[10px] mt-1 text-green-600" id="ammo-${id}">QTY: ${sys.ammo}</div>` : ''}
        `;
        
        if (sys.side === 'left') leftMenu.appendChild(btn);
        else rightMenu.appendChild(btn);
      }
      updateUI();
    }

    function updateUI() {
      // Update Master Arm UI
      const armBtn = document.getElementById('master-arm-status');
      const triggerBtn = document.getElementById('trigger-btn');
      
      if (armBtn) {
        armBtn.innerText = masterArm ? 'ARM' : 'SAFE';
        armBtn.className = masterArm ? 'text-red-500 font-bold animate-pulse px-3 bg-red-950 border border-red-500 tracking-widest' : 'text-green-500 font-bold px-3 border border-green-700 hover:bg-green-900/40 opacity-70 tracking-widest';
      }
      
      if (triggerBtn) {
        if (activeSystemId === 'radar') {
          triggerBtn.className = 'hidden';
        } else {
          triggerBtn.className = masterArm 
            ? 'absolute bottom-8 px-12 py-4 border-2 border-red-500 font-bold tracking-widest uppercase bg-red-950/80 text-red-500 hover:bg-red-900 hud-text shadow-[0_0_20px_rgba(220,38,38,0.4)] transition-all active:bg-red-600 active:text-white text-xl cursor-pointer z-20 corner-brackets'
            : 'absolute bottom-8 px-12 py-4 border-2 border-green-900 font-bold tracking-widest uppercase bg-black text-green-900 transition-all text-xl cursor-not-allowed z-20 corner-brackets opacity-50';
        }
      }

      // Highlight the active button
      for (const id of Object.keys(SYSTEMS)) {
        const btn = document.getElementById(`btn-${id}`);
        if (id === activeSystemId) {
          btn.className = 'flex flex-col items-center justify-center p-4 border-2 transition-all mb-4 border-green-400 bg-green-900/40 text-green-300 shadow-[0_0_15px_rgba(34,197,94,0.6)] corner-brackets';
        } else {
          btn.className = 'flex flex-col items-center justify-center p-4 border-2 transition-all mb-4 border-green-900/50 hover:border-green-700 hover:bg-green-900/20';
        }
        
        // Update ammo numbers
        const ammoEl = document.getElementById(`ammo-${id}`);
        if (ammoEl) ammoEl.innerText = `QTY: ${SYSTEMS[id].ammo}`;
      }

      // Update center display graphic
      const sys = SYSTEMS[activeSystemId];
      const display = document.getElementById('center-info');
      const centerGraphic = document.getElementById('center-graphic');
      
      // Resize graphic based on active system
      centerGraphic.classList.remove('w-80', 'h-80', 'w-[36rem]', 'h-[36rem]');
      if (activeSystemId === 'radar') {
        centerGraphic.classList.add('w-[36rem]', 'h-[36rem]');
      } else {
        centerGraphic.classList.add('w-80', 'h-80');
      }
      
      if (sys.iframeUrl) {
        // Adjust classes for full-bleed iframe
        display.className = "text-center hud-text absolute inset-0 z-10 rounded-full overflow-hidden flex flex-col items-center justify-center";
        display.innerHTML = `
          <iframe src="${sys.iframeUrl}" class="absolute inset-0 w-full h-full border-0 opacity-60 pointer-events-auto" style="filter: sepia(1) hue-rotate(80deg) saturate(300%) contrast(150%);"></iframe>
          <div class="text-3xl tracking-widest font-bold relative z-20 bg-black/70 px-4 py-1 rounded mt-52 pointer-events-none">${sys.name}</div>
        `;
      } else {
        // Standard icon display (now using an image tag)
        display.className = "text-center hud-text relative z-10 bg-gray-950/80 p-4 rounded-full flex flex-col items-center justify-center min-w-[200px] min-h-[200px]";
        display.innerHTML = `
          <img src="${sys.icon}" alt="${sys.name}" class="w-20 h-20 mb-6 object-contain drop-shadow-[0_0_8px_rgba(34,197,94,0.8)]" onerror="this.src='https://placehold.co/128x128/22c55e/000000.png?text=ERR'" />
          <div class="text-3xl tracking-widest font-bold">${sys.name}</div>
          ${sys.ammo !== undefined ? `<div class="text-2xl mt-4 ${sys.ammo === 0 ? 'text-red-500 animate-pulse' : ''}">AMMO: ${sys.ammo}</div>` : ''}
        `;
      }
    }

    // Run when page loads
    window.onload = init;
  </script>

  <!-- Main HTML Layout -->
  <div class="w-full max-w-6xl aspect-video bg-gray-950 border-4 border-gray-800 p-2 relative flex gap-4 overflow-hidden shadow-[0_0_50px_rgba(34,197,94,0.1)] tactical-grid">
    
    <!-- CRT Overlay -->
    <div class="absolute inset-0 scanline pointer-events-none z-50 mix-blend-overlay"></div>

    <!-- Left Buttons -->
    <div id="left-menu" class="w-32 flex flex-col justify-center py-8 z-10 border-r-2 border-dashed border-green-900/50 pr-4"></div>

    <!-- Center Screen -->
    <div class="flex-1 relative border-2 border-green-800/50 flex items-center justify-center p-4">
      
      <!-- Top info bar -->
      <div class="absolute top-4 w-full px-8 flex justify-between items-center text-sm hud-text z-20">
        <span class="border-b border-green-500/50 pb-1 tracking-widest">[ MACH 1.2 ]</span>
        <div class="flex items-center gap-2 border-b border-green-500/50 pb-1">
          <span class="tracking-widest">MASTER ARM:</span>
          <button id="master-arm-status" onclick="toggleMasterArm()" class="px-3">SAFE</button>
        </div>
        <span class="border-b border-green-500/50 pb-1 tracking-widest">[ ALT 15,200 ]</span>
      </div>

      <!-- Main Graphic -->
      <div id="center-graphic" class="w-80 h-80 border-4 border-green-500 rounded-full flex flex-col items-center justify-center transition-all duration-300 relative bg-black/40 backdrop-blur-sm">
        <!-- Reticle markings -->
        <div class="absolute w-full h-px bg-green-500/30"></div>
        <div class="absolute h-full w-px bg-green-500/30"></div>
        
        <!-- Dynamic Content injected by JS -->
        <div id="center-info" class="text-center hud-text relative z-10 p-4 rounded-full"></div>
      </div>
      
      <!-- Fire Button -->
      <button id="trigger-btn" onclick="triggerAction()" class="absolute bottom-8 px-12 py-4 border-2 border-green-500 font-bold tracking-widest uppercase bg-green-950 hover:bg-green-900 hud-text shadow-[0_0_20px_rgba(34,197,94,0.4)] transition-all active:bg-red-600 active:border-red-500 text-xl cursor-pointer z-20">
        TRIGGER
      </button>
    </div>

    <!-- Right Buttons -->
    <div id="right-menu" class="w-32 flex flex-col justify-center py-8 z-10 border-l-2 border-dashed border-green-900/50 pl-4"></div>
  </div>

</body>
</html>
